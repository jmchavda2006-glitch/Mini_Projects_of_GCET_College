{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GCET ID Card System</title>
<style>  
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #f0f4f8, #d9e2ec);
    margin: 0;
    padding: 0;
  }
  header {
    background-color: #1E90FF;
    color: #fff;
    padding: 20px 0;
    text-align: center;
    font-size: 28px;
    font-weight: bold;
    letter-spacing: 1px;
    box-shadow: 0 4px 6px rgba(0,0,0,0.1);
  }
  .container {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    margin: 50px auto;
    max-width: 1000px;
    gap: 30px;
  }
  .card {
    background: #fff;
    border-radius: 15px;
    width: 250px;
    height: 180px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    box-shadow: 0 8px 20px rgba(0,0,0,0.15);
    transition: transform 0.3s, box-shadow 0.3s;
    text-align: center;
    text-decoration: none;
    color: #333;
  }
  .card:hover {
    transform: translateY(-5px);
    box-shadow: 0 12px 25px rgba(0,0,0,0.2);
  }
  .card h2 {
    margin: 0 0 10px 0;
    color: #1E90FF;
  }
  .card p {
    margin: 0;
    font-size: 14px;
    color: #555;
  }
</style>
</head>
<body>
<header>GCET Student ID Card System</header>
<div class="container">
  <a href="{% url 'student_form' %}" class="card">
    <h2>Create ID Card</h2>
    <p>Fill student details & generate ID card</p>
  </a>

  <!-- Replaced All ID Cards button with Admin Panel -->
  <a href="{% url 'admin:index' %}" class="card" target="_blank">
    <h2>Admin Panel</h2>
    <p>View & manage all students</p>
  </a>
</div>
</body>
</html>
